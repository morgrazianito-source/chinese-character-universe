<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chinese Character Universe</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  font-family: sans-serif;
}

svg {
  width: 100vw;
  height: 100vh;
}

text {
  fill: white;
  font-size: 16px;
  pointer-events: none;
}
</style>

</head>

<body>
<svg></svg>

<script>
const nodes = [
  { id: "青", group: "core" },
  { id: "清", group: "water" },
  { id: "情", group: "emotion" },
  { id: "晴", group: "sun" },
  { id: "蜻", group: "life" },
  { id: "倩", group: "human" }
];

const links = [
  { source: "清", target: "青" },
  { source: "情", target: "青" },
  { source: "晴", target: "青" },
  { source: "蜻", target: "青" },
  { source: "倩", target: "青" }
];

const colors = {
  core: "#38bdf8",
  water: "#0ea5e9",
  emotion: "#ec4899",
  sun: "#f59e0b",
  life: "#22c55e",
  human: "#8b5cf6"
};

const svg = d3.select("svg");

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(140))
  .force("charge", d3.forceManyBody().strength(-350))
  .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));

const link = svg.append("g")
  .selectAll("line")
  .data(links)
  .enter()
  .append("line")
  .attr("stroke", "#94a3b8")
  .attr("stroke-opacity", 0.6);

const node = svg.append("g")
  .selectAll("circle")
  .data(nodes)
  .enter()
  .append("circle")
  .attr("r", 24)
  .attr("fill", d => colors[d.group])
  .style("cursor", "pointer")
  .on("click", (_, d) => {
    alert("Character: " + d.id);
  })
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended)
  );

const label = svg.append("g")
  .selectAll("text")
  .data(nodes)
  .enter()
  .append("text")
  .text(d => d.id)
  .attr("text-anchor", "middle")
  .attr("dy", 5);

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  node
    .attr("cx", d => d.x)
    .attr("cy", d => d.y);

  label
    .attr("x", d => d.x)
    .attr("y", d => d.y);
});

function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}
</script>

</body>
</html>
